services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cerebray
      POSTGRES_USER: cerebray
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cerebray}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebray"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://cerebray:${POSTGRES_PASSWORD:-cerebray}@postgres:5432/cerebray?sslmode=disable
      REDIS_URL: redis://redis:6379
      BASE_URL: ${BASE_URL:-http://localhost}
    expose:
      - "8080"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${LISTEN_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
